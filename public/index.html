<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>DJ DAMELO MUSIC</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
  <h1>DJ DAMELO MUSIC</h1>
  <button id="signin-btn">Se connecter avec Pi</button>
  <p id="user"></p>

<script>
// 1. Initialiser Pi SDK
Pi.init({ 
  version: "2.0", 
  sandbox: false // false = vrai Pi. true = test
});

// 2. Fonction connexion
async function autoSignIn() {
  try {
    const scopes = ['username', 'payments'];
    const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
    
    document.getElementById("user").innerText = "Connecté: " + auth.user.username;
    
    // Envoyer au backend
    await fetch("/api/auth", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ accessToken: auth.accessToken })
    })
    
  } catch(e) { 
    alert("Erreur: " + e); 
  }
}

// 3. Bouton
document.getElementById("signin-btn").onclick = autoSignIn;

// 4. Paiement incomplet
function onIncompletePaymentFound(payment) { 
  console.log("Paiement incomplet:", payment) 
}
</script>
</body>
</html>
