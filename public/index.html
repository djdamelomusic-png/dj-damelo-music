<!DOCTYPE html>
<html>
<head>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
  <h1>DJ DAMELO MUSIC</h1>
  <button id="signin-btn">Se connecter avec Pi</button>
  <p id="user"></p>

<script>
window.onload = async () => {
  await Pi.init({ version: "2.0", sandbox: false });
  autoSignIn();
}

async function autoSignIn() {
  try {
    const auth = await Pi.authenticate(['username'], onIncompletePaymentFound);
    document.getElementById("user").innerText = "Connecté: " + auth.user.username;
    fetch("/api/auth", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ accessToken: auth.accessToken })
    })
  } catch(e) { console.log(e) }
}

document.getElementById("signin-btn").onclick = autoSignIn;

function onIncompletePaymentFound(payment) { console.log(payment) }
</script>
</body>
</html>
