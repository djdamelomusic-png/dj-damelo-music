<script>
Pi.init({ version: "2.0", sandbox: true }); // TRUE = Pi de test gratuit
let currentUser = null;

function onIncompletePaymentFound(payment) { console.log("Paiement incomplet:", payment); }

async function login() {
  try {
    const auth = await Pi.authenticate(['payments'], onIncompletePaymentFound);
    currentUser = auth.user.username;
    document.getElementById('login-pi').style.display = 'none';
    document.getElementById('payer-pi').style.display = 'block';
  } catch(err) { alert("Erreur connexion: " + err); }
}

// BOUTON DON 0.01PI
document.getElementById('payer-pi').onclick = async () => {
  try {
    await Pi.createPayment({ amount: 0.01, memo: "Support DJ Damelo", metadata: { type: "don" } }, {
      onReadyForServerCompletion: function(paymentId, txid) { alert("Merci pour ton soutien ! 🎵"); },
      onError: function(error) { alert("Erreur: " + error.message); }
    });
  } catch(err) { alert("Ouvre le site dans Pi Browser pour payer"); }
}

// FONCTION TÉLÉCHARGER AVEC 1PI
async function acheterSon(fichier, nomSon) {
  try {
    if(!currentUser){
      await login();
    }
    
    await Pi.createPayment({ 
      amount: 1, 
      memo: "Achat: " + nomSon, 
      metadata: { type: "download", file: fichier } 
    }, {
      onReadyForServerCompletion: function(paymentId, txid) { 
        // Après paiement → Téléchargement
        let lien = document.createElement('a');
        lien.href = fichier;
        lien.download = nomSon + ".mp3";
        document.body.appendChild(lien);
        lien.click();
        document.body.removeChild(lien);
        alert("Paiement réussi ! Téléchargement de " + nomSon + " lancé 🎵");
      },
      onError: function(error) { alert("Erreur: " + error.message); }
    });
  } catch(err) { alert("Ouvre le site dans Pi Browser pour acheter"); }
}
</script>
