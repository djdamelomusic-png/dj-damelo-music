<script>
// 1. INITIALISER LE SDK
Pi.init({ version: "2.0", sandbox: false });

// 2. FONCTION POUR GÉRER PAIEMENT INCOMPLET
function onIncompletePaymentFound(payment) {
  console.log("Paiement incomplet:", payment);
}

// 3. BOUTON SE CONNECTER
async function login() {
  try {
    const auth = await Pi.authenticate(['payments'], onIncompletePaymentFound);
    console.log("Connecté:", auth.user.username);
    document.getElementById('login-pi').style.display = 'none'; // cache login
    document.getElementById('payer-pi').style.display = 'block'; // montre payer
  } catch(err) {
    alert("Erreur connexion: " + err);
  }
}

// 4. BOUTON PAYER
document.getElementById('payer-pi').onclick = async () => {
  try {
    const payment = await Pi.createPayment({
      amount: 0.01,
      memo: "Support DJ Damelo",
      metadata: { product: "Don" }
    }, {
      onReadyForServerApproval: function(paymentId) {
        console.log("Paiement prêt:", paymentId);
      },
      onReadyForServerCompletion: function(paymentId, txid) {
        alert("Merci pour ton soutien ! 🎵");
      },
      onCancel: function(paymentId) {
        console.log("Paiement annulé");
      },
      onError: function(error) {
        alert("Erreur: " + error.message);
      }
    });
  } catch(err) {
    alert("Ouvre le site dans Pi Browser pour payer avec Pi");
  }
}
