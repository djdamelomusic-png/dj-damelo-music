  <script>
    Pi.init({ version: "2.0", sandbox: false });

    async function payerEtTelecharger(fichier, nomSon) {
      if(!window.Pi) { alert("⚠️ Ouvre ce site dans Pi Browser pour payer avec Pi"); return; }
      try {
        await Pi.authenticate(['payments', 'username']);
        Pi.createPayment({
          amount: 1,
          memo: "Achat: " + nomSon + " - DJ DAMELO",
          metadata: { son: nomSon, fichier: fichier }
        }, {
          onReadyForServerApproval: async function(paymentId) {
            await fetch('/api/approve', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ paymentId }) });
          },
          onReadyForServerCompletion: async function(paymentId, txid) {
            const res = await fetch('/api/complete', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ paymentId, txid }) });
            const data = await res.json();
            if(data.status === "success") {
              let link = document.createElement('a');
              link.href = fichier;
              link.download = nomSon + ".mp3";
              document.body.appendChild(link);
              link.click();
              document.body.removeChild(link);
              alert("✅ Paiement reçu ! Téléchargement lancé 🙏 Merci pour ton soutien");
            }
          },
          onCancel: function(paymentId) { alert("Paiement annulé."); },
          onError: function(error) { alert("Erreur Pi: " + error); }
        });
      } catch(err) { alert("Erreur connexion Pi: " + err); }
    }
